#   items      : 아래 target_items 목록만 수집 (기본, 하위호환)
#   categories : minor_categories에 나열한 중분류만 수집
#   all        : 전체 92개 공시항목 수집 (355개 기관 전량이면 장시간 소요 —
#                --ministry/--apba-ids/--inst-type/--limit로 분할 실행 권장)
