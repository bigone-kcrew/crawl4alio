# ALIO 배포 스택 예시 — 경로는 환경에 맞게 수정 (예시: NAS docker 디렉토리)
#   (이 파일을 그 폴더에 docker-compose.yml 로 복사해서 사용)
# 기존 n8n/postgres compose는 건드리지 않는다.
# 전제: ai-internal 네트워크가 이미 존재. 확인: docker network ls | grep -i ai
#
# 서비스:
#   rag-api      — 조항 검색 API(node). 이미지는 기존처럼 따로 빌드해서 사용. Funnel 8443 → 8090.
#   archive-web  — 자료실 정적 서버(nginx 표준 이미지, 빌드 불필요). 2_data 읽기전용. Funnel 10000 → 8091.
#
# 실행 (배포 폴더에서):
#   # rag-api 이미지 빌드(기존 방식 그대로 — 코드 바뀌었을 때만)
#   docker build -f <repo>/rag/api/Dockerfile \
#     -t alio-rag-api:latest <repo>/rag
#   # 스택 기동(둘 다)
#   docker compose up -d
services:
  rag-api:
    container_name: alio-rag-api
    image: alio-rag-api:latest
    restart: unless-stopped
    networks:
      - ai-internal
    env_file:
      - ./.env.aliorag            # env 파일 경로는 환경에 맞게
    ports:
      - "8090:8090"

  # ── archive-web (nginx) ────────────────────────────────────────────────
  # 설정·자산은 4_archive_web/ 에 독립 보관(nginx.conf·landing) → 재사용/이식 용이.
  # 지금은 rag-api와 한 스택으로 묶지만, 이 블록을 그대로 잘라
  # 4_archive_web/docker-compose.yml(분리용 대안, 이미 존재)로 옮기면 독립 실행 가능.
  # 분리 시: ai-internal 의존 없음(DB 미사용) — 그대로 떼도 됨.
  # ※ 두 compose를 동시에 up 하지 말 것(container_name/포트 충돌).
  archive-web:
    container_name: alio-archive-web
    image: nginx:alpine
    restart: unless-stopped
    networks:
      - ai-internal          # 편의상 동일 네트워크. DB 미사용이라 분리 시 제거 가능.
    volumes:
      # 2_data는 읽기전용 — 원본 파일·구조·index.html 무수정(압축→드라이브 배포 그대로)
      - /path/to/workspace/2_data:/data:ro
      - /path/to/workspace/archive_web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /path/to/workspace/archive_web/landing:/srv/landing:ro
    ports:
      - "8091:8080"

networks:
  ai-internal:
    external: true
    name: ai-internal   # 다르면 실제 네트워크명으로 교체
